<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Title -->
    <title>The Lobby — AI Life & Business Manager</title>

    <!-- SEO -->
    <meta name="description" content="The Lobby is your AI-powered life and business manager. Handle work, money, health, hard conversations and more — all in one place. The more you connect, the less you have to ask." />

    <!-- Open Graph — controls how it looks when shared on Facebook, iMessage, LinkedIn -->
    <meta property="og:title" content="The Lobby — AI Life & Business Manager" />
    <meta property="og:description" content="Your AI handles work, money, health, hard conversations and more. Calendar, Spotify, Plaid & GPS connected at every level." />
    <meta property="og:image" content="https://app.binyaminfine.com/og-image.png" />
    <meta property="og:url" content="https://app.binyaminfine.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Lobby — AI Life & Business Manager" />
    <meta name="twitter:description" content="Your AI handles work, money, health, hard conversations and more." />
    <meta name="twitter:image" content="https://app.binyaminfine.com/og-image.png" />

    <!-- PWA — iPhone home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="The Lobby" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
